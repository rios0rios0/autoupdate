# autoupdate configuration
# Tokens can be set inline, via environment variable references (${VAR}),
# or as a path to a file containing the token.

providers:
  - type: github
    token: "${GITHUB_TOKEN}"
    organizations:
      - "my-org"

  # - type: azuredevops
  #   token: "${AZURE_DEVOPS_PAT}"
  #   organizations:
  #     - "https://dev.azure.com/MyOrg"

  # - type: gitlab
  #   token: "${GITLAB_TOKEN}"
  #   organizations:
  #     - "my-group"

# All updaters are enabled by default with auto_complete disabled.
# Users only need to override specific fields; omitted fields keep these defaults.
# The entire updaters section can be omitted to use all defaults.
updaters:
  terraform:
    enabled: true
    auto_complete: false
  golang:
    enabled: true
    auto_complete: false
  python:
    enabled: true
    auto_complete: false
  javascript:
    enabled: true
    auto_complete: false
  pipeline:
    enabled: true
    auto_complete: false
  dockerfile:
    enabled: true
    auto_complete: false
